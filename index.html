<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>project 1</title>

    <!-- Google Font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="bg-gray-100">
    <header class="w-[90%] max-w-6xl mx-auto py-10">
       <h1 class="text-4xl font-bold mb-8">Job Application Tracker</h1>
  
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-white p-6 rounded-xl shadow">
          <p class="text-gray-600">Total Jobs</p>
          <p id="totalCount" class="text-3xl font-bold">0</p>
        </div>
  
        <div class="bg-white p-6 rounded-xl shadow">
          <p class="text-gray-600">Interview</p>
          <p id="interviewCount" class="text-3xl font-bold text-green-600">0</p>
        </div>
  
        <div class="bg-white p-6 rounded-xl shadow">
          <p class="text-gray-600">Rejected</p>
          <p id="rejectedCount" class="text-3xl font-bold text-red-700">0</p>
        </div>
       </div>
    </header>
    <hr class="my-6">
    <main class="w-[90%] max-w-6xl mx-auto pb-12">

    <div class="flex justify-between items-center mb-6">
      <h2 class="text-2xl font-bold">Available Jobs</h2>
      <p class="text-gray-600">
        <span id="tabCount">0</span> Jobs
      </p>
    </div>

    <!-- Tabs -->
    <div class="flex gap-4 mb-8">
      <button id="allTab" class="tab-btn bg-blue-600 text-white px-5 py-2 rounded-lg">
        All
      </button>
      <button id="interviewTab" class="tab-btn bg-gray-200 px-5 py-2 rounded-lg">
        Interview
      </button>
      <button id="rejectedTab" class="tab-btn bg-gray-200 px-5 py-2 rounded-lg">
        Rejected
      </button>
    </div>

    <!-- Cards -->
    <section id="cardsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">

        
    </section>

    <!-- Empty State -->
    <div id="emptyState" class="hidden text-center py-20">
      <div class="text-6xl mb-4"><i class="fa-regular fa-folder"></i></div>
      <h3 class="text-xl font-semibold">No jobs available</h3>
      <p class="text-gray-500 mt-2">
        Jobs marked as Interview or Rejected will appear here.
      </p>
    </div>
  </main>
  <!-- js link -->
  <script src="index.js"></script>

</body>
</html>
